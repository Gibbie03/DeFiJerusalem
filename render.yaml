services:
  - type: web
    name: defijerusalem
    runtime: node
    plan: standard
    region: oregon
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: GOPLUS_API_KEY
        sync: false
      - key: ETHERSCAN_API_KEY
        sync: false
      - key: TWITTER_BEARER_TOKEN
        sync: false
      - key: ADMIN_BOOTSTRAP_SECRET
        sync: false

  - type: web
    name: defijerusalem-staging
    runtime: node
    plan: free
    region: oregon
    branch: staging
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: GOPLUS_API_KEY
        sync: false
      - key: ETHERSCAN_API_KEY
        sync: false
      - key: TWITTER_BEARER_TOKEN
        sync: false
      - key: ADMIN_BOOTSTRAP_SECRET
        sync: false
